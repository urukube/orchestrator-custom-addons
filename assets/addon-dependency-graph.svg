<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>Addon Dependency Graph</title>
  <desc>Istio Base installs CRDs, Istiod is the control plane that injects sidecars, the Ingress Gateway exposes addons. Prometheus, ArgoCD, and Kiali all depend on the Ingress Gateway. Kiali consumes Prometheus metrics.</desc>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="#ffffff"/>

  <text x="450" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Addon Dependency Graph</text>
  <text x="450" y="42" text-anchor="middle" font-size="11" fill="#6b7280">Istio is the networking foundation — all addons depend on it · each component is independently toggled</text>

  <!-- ══ ISTIO LAYER ══ -->
  <rect x="20" y="56" width="860" height="26" rx="6" fill="#0c4a6e"/>
  <text x="450" y="73" text-anchor="middle" font-size="10" font-weight="700" fill="#bae6fd" letter-spacing="0.8">ISTIO LAYER  (enable_istio)</text>

  <!-- Istio Base -->
  <rect x="60" y="92" width="180" height="68" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="150" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#0c4a6e">Istio Base</text>
  <text x="150" y="130" text-anchor="middle" font-size="9" fill="#0369a1">helm: istio/base</text>
  <text x="150" y="145" text-anchor="middle" font-size="9" fill="#0369a1">Installs Istio CRDs</text>
  <text x="150" y="158" text-anchor="middle" font-size="9" fill="#0369a1">VirtualService · Gateway · DR</text>

  <!-- arrow Base → Istiod -->
  <line x1="240" y1="126" x2="290" y2="126" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="265" y="120" text-anchor="middle" font-size="8" fill="#0ea5e9">CRDs</text>

  <!-- Istiod -->
  <rect x="294" y="92" width="180" height="68" rx="8" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="384" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#0c4a6e">Istiod</text>
  <text x="384" y="130" text-anchor="middle" font-size="9" fill="#0369a1">helm: istio/istiod</text>
  <text x="384" y="145" text-anchor="middle" font-size="9" fill="#0369a1">Control plane · xDS server</text>
  <text x="384" y="158" text-anchor="middle" font-size="9" fill="#0369a1">Sidecar injector webhook</text>

  <!-- arrow Istiod → Gateway -->
  <line x1="474" y1="126" x2="524" y2="126" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Ingress Gateway -->
  <rect x="528" y="92" width="200" height="68" rx="8" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2"/>
  <text x="628" y="114" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Istio Ingress Gateway</text>
  <text x="628" y="130" text-anchor="middle" font-size="9" fill="#7dd3fc">helm: istio/gateway</text>
  <text x="628" y="145" text-anchor="middle" font-size="9" fill="#7dd3fc">NLB — single cross-AZ load balancer</text>
  <text x="628" y="158" text-anchor="middle" font-size="9" fill="#7dd3fc">Routes via VirtualServices by path</text>

  <!-- Sidecar injection dashed arrows from Istiod -->
  <path d="M384,160 C384,220 220,230 220,258" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-purple)"/>
  <text x="268" y="218" font-size="8" fill="#8b5cf6" font-style="italic">sidecar injection</text>

  <path d="M384,160 C384,220 490,230 490,258" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-purple)"/>

  <!-- ══ ADDONS LAYER ══ -->
  <rect x="20" y="240" width="860" height="26" rx="6" fill="#1e1b4b"/>
  <text x="450" y="257" text-anchor="middle" font-size="10" font-weight="700" fill="#c7d2fe" letter-spacing="0.8">ADDONS LAYER  (each independently toggled)</text>

  <!-- Prometheus -->
  <rect x="60" y="276" width="200" height="90" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="160" y="298" text-anchor="middle" font-size="12" font-weight="700" fill="#7c2d12">Prometheus</text>
  <text x="160" y="314" text-anchor="middle" font-size="9" fill="#9a3412">enable_prometheus</text>
  <text x="160" y="330" text-anchor="middle" font-size="9" fill="#c2410c">helm: prometheus-community</text>
  <text x="160" y="346" text-anchor="middle" font-size="9" fill="#c2410c">namespace: monitoring</text>
  <text x="160" y="360" text-anchor="middle" font-size="9" fill="#c2410c">Istio sidecar injected ✓</text>

  <!-- ArgoCD -->
  <rect x="340" y="276" width="200" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="440" y="298" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">ArgoCD</text>
  <text x="440" y="314" text-anchor="middle" font-size="9" fill="#92400e">enable_argocd</text>
  <text x="440" y="330" text-anchor="middle" font-size="9" fill="#b45309">helm: argo/argo-cd</text>
  <text x="440" y="346" text-anchor="middle" font-size="9" fill="#b45309">namespace: argocd</text>
  <text x="440" y="360" text-anchor="middle" font-size="9" fill="#b45309">Redis/init: sidecar disabled ✓</text>

  <!-- Kiali -->
  <rect x="620" y="276" width="200" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="720" y="298" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Kiali</text>
  <text x="720" y="314" text-anchor="middle" font-size="9" fill="#15803d">enable_kiali</text>
  <text x="720" y="330" text-anchor="middle" font-size="9" fill="#166534">helm: kiali/kiali-server</text>
  <text x="720" y="346" text-anchor="middle" font-size="9" fill="#166534">namespace: istio-system</text>
  <text x="720" y="360" text-anchor="middle" font-size="9" fill="#166534">Consumes Prometheus metrics</text>

  <!-- Ingress Gateway → Addons (path-based routing via VirtualServices) -->
  <path d="M628,160 C628,200 160,230 160,276" stroke="#0ea5e9" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M628,160 C628,220 440,240 440,276" stroke="#0ea5e9" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>
  <path d="M628,160 L720,160 L720,276" stroke="#0ea5e9" stroke-width="1.5" fill="none" marker-end="url(#arr-blue)"/>

  <!-- VirtualService labels on arrows -->
  <rect x="68" y="224" width="146" height="16" rx="3" fill="#0c4a6e"/>
  <text x="141" y="235" text-anchor="middle" font-size="8" fill="#7dd3fc">/prometheus → monitoring:9090</text>
  <rect x="364" y="224" width="126" height="16" rx="3" fill="#0c4a6e"/>
  <text x="427" y="235" text-anchor="middle" font-size="8" fill="#7dd3fc">/argocd → argocd:443</text>
  <rect x="642" y="224" width="118" height="16" rx="3" fill="#0c4a6e"/>
  <text x="701" y="235" text-anchor="middle" font-size="8" fill="#7dd3fc">/kiali → istio-system:20001</text>

  <!-- Prometheus → Kiali metrics arrow -->
  <path d="M260,321 C310,321 570,321 620,321" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-green)"/>
  <text x="440" y="314" text-anchor="middle" font-size="0" fill="#10b981">metrics</text>
  <rect x="390" y="308" width="102" height="16" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="441" y="319" text-anchor="middle" font-size="8" fill="#15803d">Prometheus metrics feed</text>

  <!-- ══ LEGEND ══ -->
  <rect x="20" y="384" width="860" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="32" y="393" width="10" height="10" rx="2" fill="#0ea5e9"/>
  <text x="48" y="402" font-size="9" fill="#374151">Istio dependency / routing</text>
  <rect x="180" y="393" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="196" y="402" font-size="9" fill="#374151">Sidecar injection (dashed)</text>
  <rect x="340" y="393" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="356" y="402" font-size="9" fill="#374151">Metrics feed</text>
  <text x="470" y="402" font-size="9" fill="#6b7280">All addons are <tspan font-weight="700">disabled by default</tspan> — set enable_* = true to install</text>
  <text x="760" y="402" font-size="9" fill="#6b7280">ESO: always on</text>
</svg>
